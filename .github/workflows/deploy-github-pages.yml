# GitHub Pages for https://github.com/rentahub2026/rentahub2026.github.io
# User/organization site → live at https://rentahub2026.github.io/ (root, not a /repo/ subpath)
#
# 1. Repo → Settings → Pages → Build: GitHub Actions
# 2. (Optional) Add VITE_STRIPE_KEY in Settings → Secrets and variables → Actions
# 3. Push to `main` to deploy

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install and build
        env:
          # Root of rentahub2026.github.io — not /repo-name/
          VITE_BASE: '/'
          VITE_STRIPE_KEY: ${{ secrets.VITE_STRIPE_KEY }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
