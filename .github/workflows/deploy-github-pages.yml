# GitHub Pages deploy (user/org site root)
#
# ⚠️ If you see a blank white page: Pages must deploy THIS workflow’s artifact,
# NOT "Deploy from a branch" using the repo root. Root index.html points at /src/main.tsx
# (dev only); production lives in dist/ after `npm run build`.
#
# Settings → Pages → Source: GitHub Actions (pick this workflow).
# Optional (Actions → Secrets and variables → Actions):
# VITE_FIREBASE_* — Firebase web SDK (same names as `.env.local`)
# Without them, Firebase may be unset in the production bundle depending on fallback env.

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Project pages live at https://<owner>.github.io/<repo>/ — Vite must use that base
      # or /assets/*.js is requested from the domain root and returns the wrong body/MIME.
      # User/org site repos named *.github.io keep base '/'.
      - name: Install and build
        env:
          VITE_STRIPE_KEY: ${{ secrets.VITE_STRIPE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          NAME="${{ github.event.repository.name }}"
          if [ -n "${{ vars.VITE_BASE }}" ]; then
            export VITE_BASE="${{ vars.VITE_BASE }}"
          else
            case "$NAME" in
              *.github.io) export VITE_BASE="/" ;;
              *) export VITE_BASE="/${NAME}/" ;;
            esac
          fi
          echo "Building with VITE_BASE=$VITE_BASE"
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
