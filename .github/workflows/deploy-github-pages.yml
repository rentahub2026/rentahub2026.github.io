# GitHub Pages for https://github.com/rentahub2026/rentahub2026.github.io
#
# ⚠️ If you see a blank white page: Pages must deploy THIS workflow’s artifact,
# NOT "Deploy from a branch" using the repo root. Root index.html points at /src/main.tsx
# (dev only); production lives in dist/ after `npm run build`.
#
# Settings → Pages → Source: GitHub Actions (pick this workflow).
# Optional: Secrets → Actions → VITE_STRIPE_KEY for Stripe test mode live.

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install and build
        env:
          # Root of rentahub2026.github.io — not /repo-name/
          VITE_BASE: '/'
          VITE_STRIPE_KEY: ${{ secrets.VITE_STRIPE_KEY }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
